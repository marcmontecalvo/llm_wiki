daemon:
  inbox_poll_seconds: 15
  retry_failed_ingests_every_minutes: 30
  rebuild_index_every_minutes: 30
  lint_every_minutes: 60
  stale_check_every_hours: 24
  export_every_minutes: 60
  duplicates_check_every_hours: 24
  review_queue_every_minutes: 60
  review_queue_min_page_quality: 0.4
  review_queue_min_claim_confidence: 0.5
  review_queue_max_pending: 1000
  review_queue_retention_days: 30
  max_parallel_jobs: 2
  log_level: INFO
  review_queue_enabled: true

duplicates:
  enabled: true
  detection_interval: 86400  # daily (in seconds)
  min_score_to_flag: 0.5
  auto_merge_threshold: 0.9
  require_review: true
  check_domains:
    - tech
    - general
  exclude_kinds:
    - source  # Don't check source docs
