name: CI
# CI pipeline for LLM Wiki system
# Runs on: push to main, all pull requests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      # Test against both supported Python versions
      # 3.11: LTS, maximum compatibility
      # 3.12: Latest features, newest dependencies
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      # uv: Fast Python package manager
      # Benefits: Caching, parallel installs, lock file support
      uses: astral-sh/setup-uv@v4

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      # Uses uv.lock for reproducible builds
      # Includes all dev dependencies (testing, linting, type checking)
      run: uv sync

    - name: Run linters
      # Ruff: Fast Python linter and formatter
      # Checks:
      #   - ruff check: Syntax errors, style violations, bugs
      #   - ruff format: Code formatting一致性
      #   - mypy: Static type checking, catches type errors before runtime
      run: |
        uv run ruff check .
        uv run ruff format --check .
        uv run mypy src/

    - name: Run tests with coverage
      # Pytest: Test runner with fixtures and parametrize
      # Coverage targets:
      #   - 90% minimum for new code (see copilot-instructions.md)
      #   - 100% required for CLI commands
      #   - All extractors/exporters must have tests
      run: |
        uv run pytest --cov=src/llm_wiki --cov-report=xml --cov-report=term

    - name: Upload coverage
      # Codecov: Tracks coverage trends over time
      # fail_ci_if_error: false prevents flaky coverage from blocking PRs
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Build package
      # uv build: Creates wheel and source distribution
      # Outputs to dist/ directory
      run: uv build

    - name: Check build artifacts
      # Verify build produced expected artifacts
      run: ls -lh dist/
